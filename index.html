<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALEKO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="isdf.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="cart.css">
</head>
<body>

  <!-- SHARED NAVBAR -->
  <div id="navbar"></div>

  <!-- AUTH MODAL -->
  <div id="authModal"></div>

  <section class="intro">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <main class="hero">
      <div class="hero-eyebrow">
        <span class="dot"></span>
        New Season 2025
        <span class="dot"></span>
      </div>
      <h1 class="hero-main">
        <span class="line-wrap"><span class="reveal-line">Where style speaks,</span></span>
        <span class="line-wrap"><span class="reveal-line delay-1">trends <em>resonate,</em></span></span>
        <span class="line-wrap"><span class="reveal-line delay-2">fashion meets art</span></span>
      </h1>
      <p class="hero-content">
        Discover the latest fashion trends and express your unique style<br>with our carefully curated collection.
      </p>
      <div class="hero-actions">
        <a href="/shop.html" class="new-collection">
          <span>New Collection</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </main>

    <div class="scroll-indicator">
      <span class="scroll-label">scroll</span>
      <div class="scroll-wheel">
        <div class="scroll-dot"></div>
      </div>
      <svg class="scroll-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    </div>
  </section>

  <script type="module" src="navbar.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
